name: CI

on:
  push:
    branches: ["main"]
    tags:
      - "v*" # Triggers the workflow when a version tag is pushed
  pull_request:
    branches: ["main"]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Format check
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy -- -D warnings
      - name: Run tests
        run: cargo test --verbose

  crates:
    name: Publish Crate to crates.io
    runs-on: ubuntu-latest
    needs: test

    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Authenticate with crates.io (OIDC)
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Run cargo publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  pypi:
    name: Build Wheels (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    needs: test

    if: startsWith(github.ref, 'refs/tags/v')

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            cibw_archs: x86_64
            cibw_environment_macos: ""
          - name: linux-aarch64
            os: ubuntu-24.04-arm
            cibw_archs: aarch64
            cibw_environment_macos: ""
          - name: windows-amd64
            os: windows-latest
            cibw_archs: AMD64
            cibw_environment_macos: ""
          - name: macos-arm64
            os: macos-14
            cibw_archs: arm64
            cibw_environment_macos: MACOSX_DEPLOYMENT_TARGET=11.0

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==4.1.0

      - name: Build Wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: "cp39-* cp314t-*"
          CIBW_SKIP: "*-musllinux_*"
          CIBW_ARCHS: ${{ matrix.cibw_archs }}
          CIBW_BEFORE_ALL_LINUX: curl -sSf https://sh.rustup.rs | sh -s -- -y
          CIBW_ENVIRONMENT_LINUX: "PATH=$HOME/.cargo/bin:$PATH"
          CIBW_ENVIRONMENT_MACOS: ${{ matrix.cibw_environment_macos }}
          CIBW_TEST_REQUIRES: numpy
          CIBW_TEST_COMMAND: 'python -c "import betulars; print(betulars.__version__)"'

      - name: Upload Wheels as Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.name }}
          path: wheelhouse/*.whl
          retention-days: 1

  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    needs: test

    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install maturin
        run: python -m pip install maturin

      - name: Build source distribution
        run: python -m maturin sdist --out dist

      - name: Upload sdist as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          retention-days: 1

  pypi-publish:
    name: Upload to PyPI
    runs-on: ubuntu-latest
    needs: [pypi, sdist]
    environment: pypi

    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist/
          merge-multiple: true

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist/

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate distributions
        run: |
          python -m pip install twine
          python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
